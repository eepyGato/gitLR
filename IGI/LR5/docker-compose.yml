# docker-compose.yml
version: '3.8'

services:
  web:
    build: .
    container_name: insurance_firm_web
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - DATABASE_URL=postgresql://insurance_user:insurance_password@db:5432/insurance_db
      - SECRET_KEY=${SECRET_KEY:-django-insecure-production-key-change-me}
      - TIME_ZONE=Europe/Minsk
      - LOG_LEVEL=INFO
    depends_on:
      - db
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
      - ./logs:/app/logs
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: insurance_firm_db
    environment:
      - POSTGRES_DB=insurance_db
      - POSTGRES_USER=insurance_user
      - POSTGRES_PASSWORD=insurance_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  postgres_data: